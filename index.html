<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A melhor escolha das nossas vidas</title>

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    font-family: 'Georgia', serif;
    background: url('https://raw.githubusercontent.com/placeholder/imagem.jpg') no-repeat center center/cover;
}

.overlay{
    background: rgba(0,0,0,0.6);
    padding:50px;
    border-radius:20px;
}

h1{
    font-size:38px;
    margin-bottom:30px;
}

#countdown{
    font-size:45px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="overlay">
<h1>A melhor escolha das nossas vidas !</h1>
<div id="countdown"></div>
</div>

<script>
const countdownDate = new Date("December 18, 2026 21:00:00").getTime();

const x = setInterval(function() {

  const now = new Date().getTime();
  const distance = countdownDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
  days + " dias " + hours + " horas "
  + minutes + " minutos " + seconds + " segundos ";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML =
    "Chegou o nosso tão sonhado dia !";
  }
}, 1000);
</script>

</body>
</html>
