<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A melhor escolha das nossas vidas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    font-family:'Playfair Display', serif;
    background:
      linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
      url(''https://raw.githubusercontent.com/LucasToledoBardeli/lucas-e-noiva/refs/heads/main/WhatsApp%20Image%202026-03-02%20at%2023.59.35.jpeg') no-repeat center center/cover;
    padding:20px;
    overflow:hidden;
}

/* Brilho dourado suave */
body::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 60%);
    animation: brilho 8s linear infinite;
    pointer-events:none;
}

@keyframes brilho{
    0%{ transform:translate(-25%,-25%) rotate(0deg); }
    100%{ transform:translate(-25%,-25%) rotate(360deg); }
}

.overlay{
    position:relative;
    background: rgba(0,0,0,0.65);
    padding:40px 25px;
    border-radius:25px;
    width:100%;
    max-width:420px;
    animation: fadeIn 2s ease-in-out;
    z-index:2;
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:42px;
    margin-bottom:30px;
}

#countdown{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
    margin-bottom:30px;
}

.number{
    font-size:48px;
    font-weight:600;
    transition: transform 0.4s ease, opacity 0.4s ease;
}

.number.animate{
    transform: translateY(-12px);
    opacity:0;
}

.label{
    font-size:14px;
    letter-spacing:2px;
    margin-top:5px;
}

.music-btn{
    background: rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    color:white;
    padding:12px 20px;
    border-radius:30px;
    font-size:14px;
    cursor:pointer;
    transition:0.3s;
}

.music-btn:hover{
    background: rgba(255,255,255,0.3);
}

@keyframes fadeIn{
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* Corações flutuando */
.heart{
    position:absolute;
    color:rgba(255,182,193,0.6);
    font-size:18px;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    20%{opacity:1;}
    100%{
        transform:translateY(-10vh) scale(1);
        opacity:0;
    }
}

@media (max-width:350px){
    h1{ font-size:34px; }
    .number{ font-size:38px; }
}

</style>
</head>
<body>

<audio id="music" loop>
  <source src="https://github.com/LucasToledoBardeli/lucas-e-noiva/raw/refs/heads/main/Henrique%20e%20Juliano%20Realidade%20ou%20fantasia%20%20Video%20DVD%20To%20Be%20Brasilia%20+%20Musica%20DVD%20Ao%20Vivo%20Em%20Brasilia%20-%20Vanderson%20Antonio%20(youtube).mp3" type="audio/mpeg">
</audio>

<div class="overlay">

<h1>A melhor escolha das nossas vidas !</h1>

<div id="countdown">
  <div>
    <div class="number" id="days"></div>
    <div class="label">DIAS</div>
  </div>
  <div>
    <div class="number" id="hours"></div>
    <div class="label">HORAS</div>
  </div>
  <div>
    <div class="number" id="minutes"></div>
    <div class="label">MINUTOS</div>
  </div>
  <div>
    <div class="number" id="seconds"></div>
    <div class="label">SEGUNDOS</div>
  </div>
</div>

<button class="music-btn" onclick="toggleMusic()">
🎵 Tocar música
</button>

</div>

<script>

const countdownDate = new Date("December 18, 2026 21:00:00").getTime();
const music = document.getElementById("music");
const btn = document.querySelector(".music-btn");

function animateNumber(id, value){
    const el = document.getElementById(id);
    el.classList.add("animate");
    setTimeout(()=>{
        el.innerHTML = value;
        el.classList.remove("animate");
    },200);
}

setInterval(function() {

  const now = new Date().getTime();
  const distance = countdownDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  animateNumber("days", days);
  animateNumber("hours", hours);
  animateNumber("minutes", minutes);
  animateNumber("seconds", seconds);

  if (distance < 0) {
    document.querySelector(".overlay").innerHTML =
    "<h1>Chegou o nosso tão sonhado dia !</h1>";
  }

}, 1000);

// Música no primeiro toque
document.body.addEventListener("click", function(){
    if(music.paused){
        music.play();
        btn.innerHTML = "⏸ Pausar música";
    }
}, { once: true });

function toggleMusic(){
  if(music.paused){
      music.play();
      btn.innerHTML = "⏸ Pausar música";
  } else {
      music.pause();
      btn.innerHTML = "🎵 Tocar música";
  }
}

// Criar corações aleatórios
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{ heart.remove(); },10000);
}

setInterval(createHeart, 1200);

</script>

</body>
</html>
</script>

</body>
</html>
